# ─────────────────────────────────────────────────────────────────────────────
# REFERENCE COPY — this is what install-rsyslog-sdl.sh writes to
# /etc/rsyslog.d/60-sdl-hec.conf. The installer is the source of truth; this file
# is here so you can read the configuration at rest without running anything.
#
# The only value substituted per host is the collector FQDN in sdlLocalLine
# (shown here as COLLECTOR_FQDN); the installer fills it from `hostname -f`.
# Port (5514) and the receive-buffer size come from SDL_SYSLOG_PORT / SDL_UDP_RCVBUF.
# ─────────────────────────────────────────────────────────────────────────────

# SDL mixed Cisco/Meraki syslog ingest on a single port.
# Managed by install-rsyslog-sdl.sh. Local copies are in /var/log/sdl-rsyslog.

# imudp: 2 receiver threads so a burst on one socket cannot starve the other.
module(load="imudp" threads="2")
module(load="imtcp")
module(load="omprog")

# UDP is required because some source devices can only emit UDP syslog. UDP has no
# delivery ack, so a burst (e.g. a reassociation storm) that overruns the
# kernel socket buffer is dropped silently. rcvbufSize requests a larger
# SO_RCVBUF, but rsyslog does NOT use SO_RCVBUFFORCE, so the kernel caps it at
# net.core.rmem_max. The installer raises that where permitted; inside an
# unprivileged LXC it is owned by the host and must be set there (the installer
# detects this and prints the exact host command). No rate limiting
# (ratelimit.interval default 0) so we never deliberately discard events.
input(type="imudp" port="5514" ruleset="sdl_ingest" name="sdl_udp_5514" rcvbufSize="8m")

# TCP is enabled for lab/future support. If your sources cannot use TCP or you
# want UDP only, comment out the next line and restart rsyslog.
input(type="imtcp" port="5514" ruleset="sdl_ingest" name="sdl_tcp_5514")

template(name="sdlLocalLine" type="string" string="%timegenerated% host=COLLECTOR_FQDN from=%fromhost-ip% sysloghost=%hostname% timereported=%timereported:::date-rfc3339% msg=%msg%\n")
template(name="sdlProgLine" type="string" string="%fromhost-ip%\t%hostname%\t%timereported:::date-unixtimestamp%\t%msg%\n")

ruleset(name="sdl_ingest") {
  # Catalyst IOS/NX-ish body signature: %FACILITY-SEV-MNEMONIC:
  if re_match($msg, "%[A-Z0-9_]+-[0-9]+-[A-Z0-9_]+:") then {
    action(type="omfile" file="/var/log/sdl-rsyslog/catalyst.log" template="sdlLocalLine")
    action(type="omprog" name="sdl_hec_catalyst" binary="/usr/bin/python3 -I /usr/local/bin/rsyslog-sdl-hec.py catalyst cisco_catalyst /var/log/sdl-rsyslog/catalyst.log" template="sdlProgLine")
    stop
  }

  # Meraki-style wireless/AP event body. Keep this intentionally broad:
  # in practice these messages are syslog-ish but not reliably parsed
  # as RFC3164/RFC5424, so body matching is safer than hostname/IP fields.
  if $msg contains " events type=" then {
    action(type="omfile" file="/var/log/sdl-rsyslog/meraki.log" template="sdlLocalLine")
    action(type="omprog" name="sdl_hec_meraki" binary="/usr/bin/python3 -I /usr/local/bin/rsyslog-sdl-hec.py meraki cisco_meraki /var/log/sdl-rsyslog/meraki.log" template="sdlProgLine")
    stop
  }

  # Catch-all: still write locally and forward to SDL unknown parser.
  action(type="omfile" file="/var/log/sdl-rsyslog/unknown.log" template="sdlLocalLine")
  action(type="omprog" name="sdl_hec_unknown" binary="/usr/bin/python3 -I /usr/local/bin/rsyslog-sdl-hec.py unknown lab_unknown /var/log/sdl-rsyslog/unknown.log" template="sdlProgLine")
}
